# ── Rate-limiting zones ───────────────────────────────────────────────────────
# General API: 30 req/min per source IP (burst of 20 allowed without delay)
limit_req_zone  $binary_remote_addr  zone=api_zone:10m   rate=30r/m;
# Auth endpoints: 5 req/min per source IP (strict — prevents brute-force)
limit_req_zone  $binary_remote_addr  zone=auth_zone:10m  rate=5r/m;
# Concurrent connections per source IP
limit_conn_zone $binary_remote_addr  zone=conn_zone:10m;

# ── Structured JSON access-log format ─────────────────────────────────────────
# Logs every request with timing, IP, user-agent, and upstream info.
# All output goes to stdout so Podman/Docker captures it automatically.
log_format json_combined escape=json
    '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"real_ip":"$http_x_real_ip",'
        '"forwarded_for":"$http_x_forwarded_for",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"args":"$args",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"referer":"$http_referer"'
    '}';

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from error pages and Server header
    server_tokens off;

    # All access logs as structured JSON to stdout (captured by container runtime)
    access_log /dev/stdout json_combined;
    error_log  /dev/stderr  warn;

    # ── Connection & request limits ───────────────────────────────────────────
    limit_conn      conn_zone 50;
    client_max_body_size  10m;
    client_body_timeout   12s;
    client_header_timeout 12s;
    keepalive_timeout     30s;
    send_timeout          10s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                            always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # CSP: tighten in production by removing 'unsafe-inline'/'unsafe-eval' once
    # the React build switches to hashed inline scripts.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://cloudflareinsights.com https://static.cloudflareinsights.com; frame-ancestors 'none';"
        always;

    # ── Static SPA files ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Auth endpoints — stricter rate limit (brute-force protection) ─────────
    location /api/auth/ {
        limit_req zone=auth_zone burst=5 nodelay;

        proxy_pass            http://backend:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_connect_timeout 10s;
    }

    # ── General API proxy with rate limiting ──────────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;

        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_cache_bypass     $http_upgrade;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;
        proxy_connect_timeout  10s;
    }

    # ── Long-lived static assets ──────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── nginx stub_status — only reachable from the internal container network ─
    # Used by the nginx-prometheus-exporter sidecar (monitoring profile).
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 172.16.0.0/12;   # Docker/Podman bridge subnets
        allow 10.0.0.0/8;
        deny all;
        access_log off;
    }
}
